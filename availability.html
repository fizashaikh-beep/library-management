<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Availability - Library Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            flex: 1;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip : text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* Search & Filters */
        .controls {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 20px;
            border: 2px solid #e1e5e9;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn.active,
        .filter-btn:hover {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        /* Books Grid */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .book-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.4s ease;
            position: relative;
        }

        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .book-image {
            height: 220px;
            background: linear-gradient(45deg, #f0f2f5, #e9ecef);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: #ccc;
            position: relative;
            overflow: hidden;
        }

        .availability-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .available {
            background: #d4edda;
            color: #155724;
        }

        .unavailable {
            background: #f8d7da;
            color: #721c24;
        }

        .book-info {
            padding: 25px;
        }

        .book-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2c3e50;
            line-height: 1.3;
        }

        .book-author {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .book-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .copies-info {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
        }

        .copies-total {
            color: #666;
        }

        .copies-available {
            color: #28a745;
            font-weight: 600;
        }

        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-reserve {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-reserve:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-unavailable {
            background: #6c757d;
            color: white;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .empty-icon {
            font-size: 5rem;
            color: #ddd;
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content,
            .controls {
                flex-direction: column;
                gap: 20px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px 20px;
            }

            .container {
                padding: 20px 15px;
            }

            .books-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <span>Library Management</span>
            </div>
            <div class="user-info">
                <span>Welcome, <strong>John Doe</strong></span>
                <div class="user-avatar">JD</div>
                <a href="#" style="color: #666; text-decoration: none;">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Stats Cards -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" data-total="1245">1,245</div>
                <div class="stat-label">Total Books</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" data-available="892">892</div>
                <div class="stat-label">Available</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" data-issued="353">353</div>
                <div class="stat-label">Issued</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" data-reserved="45">45</div>
                <div class="stat-label">Reserved</div>
            </div>
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title">Book Availability</h1>
            <p style="color: #666; font-size: 1.1rem;">Browse our collection and check book availability</p>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search books by title, author, or ISBN...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="available">Available</button>
                <button class="filter-btn" data-filter="fiction">Fiction</button>
                <button class="filter-btn" data-filter="non-fiction">Non-Fiction</button>
            </div>
        </div>

        <!-- Books Grid -->
        <div class="books-grid" id="booksGrid">
            <!-- Books will be populated by JavaScript -->
        </div>
    </div>

    <script>
        // Sample book data
        const booksData = [
            {
                id: 1,
                title: "To Kill a Mockingbird",
                author: "Harper Lee",
                genre: "fiction",
                totalCopies: 5,
                availableCopies: 3,
                isbn: "978-0061120084",
                cover: "📖"
            },
            {
                id: 2,
                title: "1984",
                author: "George Orwell",
                genre: "fiction",
                totalCopies: 8,
                availableCopies: 0,
                isbn: "978-0451524935",
                cover: "📚"
            },
            {
                id: 3,
                title: "Sapiens: A Brief History of Humankind",
                author: "Yuval Noah Harari",
                genre: "non-fiction",
                totalCopies: 4,
                availableCopies: 2,
                isbn: "978-0062316097",
                cover: "📖"
            },
            {
                id: 4,
                title: "Clean Code",
                author: "Robert C. Martin",
                genre: "non-fiction",
                totalCopies: 6,
                availableCopies: 6,
                isbn: "978-0132350884",
                cover: "💻"
            },
            {
                id: 5,
                title: "The Great Gatsby",
                author: "F. Scott Fitzgerald",
                genre: "fiction",
                totalCopies: 7,
                availableCopies: 1,
                isbn: "978-0743273565",
                cover: "📖"
            },
            {
                id: 6,
                title: "Atomic Habits",
                author: "James Clear",
                genre: "non-fiction",
                totalCopies: 10,
                availableCopies: 4,
                isbn: "978-0735211292",
                cover: "📘"
            }
        ];

        // Initialize page
        function init() {
            renderBooks(booksData);
            setupEventListeners();
            updateStats();
        }

        function renderBooks(books) {
            const grid = document.getElementById('booksGrid');
            
            if (books.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-search"></i>
                        </div>
                        <h3>No books found</h3>
                        <p>Try adjusting your search or filter criteria</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = books.map(book => `
                <div class="book-card" data-genre="${book.genre}" data-available="${book.availableCopies > 0}">
                    <div class="book-image">
                        <span>${book.cover}</span>
                        <div class="availability-badge ${book.availableCopies > 0 ? 'available' : 'unavailable'}">
                            ${book.availableCopies > 0 ? 'Available' : 'Unavailable'}
                        </div>
                    </div>
                    <div class="book-info">
                        <h3 class="book-title">${book.title}</h3>
                        <div class="book-author">by ${book.author}</div>
                        <div class="book-details">
                            <div class="copies-info">
                                <span class="copies-total">${book.totalCopies} copies</span>
                                <span class="copies-available">${book.availableCopies} available</span>
                            </div>
                            <small>ISBN: ${book.isbn}</small>
                        </div>
                        <button class="action-btn ${book.availableCopies > 0 ? 'btn-reserve' : 'btn-unavailable'}"
                                ${book.availableCopies === 0 ? 'disabled' : ''}>
                            ${book.availableCopies > 0 ? 
                                '<i class="fas fa-calendar-plus"></i> Reserve Now' : 
                                '<i class="fas fa-clock"></i> Waitlist'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function setupEventListeners() {
            // Search functionality
            document.getElementById('searchInput').addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase();
                const filteredBooks = booksData.filter(book => 
                    book.title.toLowerCase().includes(query) ||
                    book.author.toLowerCase().includes(query) ||
                    book.isbn.includes(query)
                );
                renderBooks(filteredBooks);
            });

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    const filter = this.dataset.filter;
                    let filteredBooks = booksData;
                    
                    if (filter !== 'all') {
                        filteredBooks = booksData.filter(book => {
                            if (filter === 'available') {
                                return book.availableCopies > 0;
                            }
                            return book.genre === filter;
                        });
                    }
                    
                    renderBooks(filteredBooks);
                });
            });

            // Reserve button clicks
            document.getElementById('booksGrid').addEventListener('click', function(e) {
                if (e.target.closest('.btn-reserve')) {
                    const bookCard = e.target.closest('.book-card');
                    const title = bookCard.querySelector('.book-title').textContent;
                    alert(`🎉 "${title}" reserved successfully!\nYou will receive a confirmation email.`);
                }
            });
        }

        function updateStats() {
            const totalBooks = booksData.length;
            const availableBooks = booksData.filter(b => b.availableCopies > 0).length;
            const issuedBooks = booksData.reduce((sum, b) => sum + (b.totalCopies - b.availableCopies), 0);
            const reservedBooks = 45; // Static for demo

            document.querySelector('[data-total]').textContent = totalBooks.toLocaleString();
            document.querySelector('[data-available]').textContent = availableBooks;
            document.querySelector('[data-issued]').textContent = issuedBooks;
            document.querySelector('[data-reserved]').textContent = reservedBooks;
        }

        // Initialize when page loads
